# Portret door Josette — production stack on the home server, fronted by Cloudflare Tunnel.
#
# Runs the pre-built GHCR images (CI builds + pushes on every push to main; Watchtower
# pulls :latest here every 5 min). Same project name as the repo-root compose, so it
# reuses the SAME pb_data volume — Josette's content/images survive the cutover.
#
# Run from this directory:  docker compose up -d
name: portret-door-josette

services:
  pocketbase:
    image: ghcr.io/flack27/portret-pocketbase:latest
    container_name: portret-pocketbase
    restart: unless-stopped
    environment:
      # On any content save, the pb_hook pings the web app to refresh its cache.
      REVALIDATE_URL: http://web:3000/api/revalidate
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
    volumes:
      - pb_data:/pb/pb_data          # SQLite DB + all uploaded images (BACK THIS UP)
    ports:
      - "8090:8090"                  # LAN access to the admin UI (cms.* also reaches it via the tunnel)
    networks: [portret-net]

  web:
    image: ghcr.io/flack27/portret-web:latest
    container_name: portret-web
    restart: unless-stopped
    depends_on:
      - pocketbase
    environment:
      NODE_ENV: production
      PORT: "3000"
      # Content is read over the internal network; image URLs resolve via the public CMS host.
      POCKETBASE_URL: http://pocketbase:8090
      NEXT_PUBLIC_POCKETBASE_URL: ${NEXT_PUBLIC_POCKETBASE_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      CONTACT_TO_EMAIL: ${CONTACT_TO_EMAIL}
      CONTACT_FROM_EMAIL: ${CONTACT_FROM_EMAIL}
      NEXT_PUBLIC_FACEBOOK_URL: ${NEXT_PUBLIC_FACEBOOK_URL:-}
      NEXT_PUBLIC_INSTAGRAM_URL: ${NEXT_PUBLIC_INSTAGRAM_URL:-}
    expose:
      - "3000"
    networks: [portret-net]

  # Cloudflare Tunnel. Public hostnames (configured in the CF dashboard, token-managed):
  #   portretdoorjosette.nl       -> http://web:3000
  #   cms.portretdoorjosette.nl   -> http://pocketbase:8090
  # (www -> non-www handled by a Cloudflare Redirect Rule; see deploy notes.)
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: portret-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - web
      - pocketbase
    networks: [portret-net]

  # Auto-deploy: polls GHCR every 5 min, pulls new :latest for the 2 app images,
  # recreates them, prunes old images. pocketbase data is in the volume, untouched.
  watchtower:
    image: containrrr/watchtower:latest
    container_name: portret-watchtower
    restart: unless-stopped
    environment:
      DOCKER_API_VERSION: "1.44"     # containrrr ships an old client; Docker 29 needs >= 1.40
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/flackrdp/.docker/config.json:/config.json:ro   # GHCR pull auth (read-only)
    command: --interval 300 --cleanup portret-web portret-pocketbase

networks:
  portret-net:
    driver: bridge

volumes:
  pb_data:
