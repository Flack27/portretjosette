name: build-publish

# On push to main: build the 2 images and push them to GHCR (private).
# Watchtower on the home server pulls :latest and redeploys within ~5 min.
#
# The web image bakes NEXT_PUBLIC_* at build time. The domain is known up front
# (portretdoorjosette.nl), so those are defaulted here — override via repo
# Variables (Settings > Secrets and variables > Actions > Variables) if it ever
# changes, without editing this file.
on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'pocketbase/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: flack27          # GHCR namespace (lowercased owner of Flack27/portretjosette)

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write     # push to GHCR using the built-in token
    strategy:
      matrix:
        include:
          - name: portret-web
            context: web
            dockerfile: web/Dockerfile
            build-args: |
              NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL || 'https://portretdoorjosette.nl' }}
              NEXT_PUBLIC_POCKETBASE_URL=${{ vars.NEXT_PUBLIC_POCKETBASE_URL || 'https://cms.portretdoorjosette.nl' }}
              GOOGLE_SITE_VERIFICATION=${{ vars.GOOGLE_SITE_VERIFICATION }}
          - name: portret-pocketbase
            context: pocketbase
            dockerfile: pocketbase/Dockerfile
            build-args: ""
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build-args }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.name }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.name }}:${{ github.sha }}
